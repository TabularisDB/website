# Build Next.js website and deploy to GitHub Pages
name: Deploy website to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # Allow the app repo to trigger a rebuild when version / CHANGELOG /
  # plugin registry change. Send a `repository_dispatch` with
  # event_type = "app-data-updated".
  repository_dispatch:
    types: [app-data-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch app data (version, changelog, plugin registry)
        run: pnpm fetch-app-data

      - name: Build
        run: pnpm build

      - name: Fix opengraph-image extension for GitHub Pages
        run: |
          find out -name "opengraph-image" | while read f; do
            cp "$f" "${f}.png"
          done
          find out -name "*.html" -exec sed -i 's|/opengraph-image?|/opengraph-image.png?|g' {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
